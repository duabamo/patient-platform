name: CI - Build & Test

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  build-patient-profile-service:
    name: Build patient-profile-service
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: Build & Test
        working-directory: ./patient-profile-service
        run: mvn -B clean verify

      - name: Upload test report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: patient-profile-test-report
          path: patient-profile-service/target/surefire-reports/

  build-reporting-service:
    name: Build reporting-service
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: Build & Test
        working-directory: ./reporting-service
        run: mvn -B clean verify

      - name: Upload test report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: reporting-test-report
          path: reporting-service/target/surefire-reports/

  docker-build:
    name: Docker compose build
    runs-on: ubuntu-latest
    needs: [build-patient-profile-service, build-reporting-service]
    steps:
      - uses: actions/checkout@v4

      - name: Build Docker images
        run: docker compose build
