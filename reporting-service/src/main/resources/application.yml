server:
  port: 8085

spring:
  application:
    name: reporting-service

  datasource:
    url: ${DATASOURCE_URL:jdbc:postgresql://localhost:5432/reporting_db}
    username: ${DATASOURCE_USERNAME:postgres}
    password: ${DATASOURCE_PASSWORD:postgres}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        format_sql: true
    database-platform: org.hibernate.dialect.PostgreSQLDialect

  jackson:
    serialization:
      write-dates-as-timestamps: false
    default-property-inclusion: non_null

# URL du patient-profile-service (override via env)
patient-profile:
  service:
    url: ${PATIENT_PROFILE_URL:http://patient-profile-service:8081}

# Configuration Feign
feign:
  circuitbreaker:
    enabled: true
  client:
    config:
      default:
        connectTimeout: 5000
        readTimeout: 10000
        loggerLevel: basic

# Cron des rapports automatiques (Spring cron: sec min hour day month weekday)
reporting:
  weekly:
    cron: "0 0 2 * * MON"   # Tous les lundis a 02:00
  monthly:
    cron: "0 0 3 1 * *"     # Le 1er de chaque mois a 03:00

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      show-details: when-authorized

springdoc:
  swagger-ui:
    path: /swagger-ui.html
  api-docs:
    path: /v3/api-docs

logging:
  level:
    com.healthcare: INFO
    feign: INFO

---
spring:
  config:
    activate:
      on-profile: dev
  datasource:
    url: jdbc:h2:mem:reporting;DB_CLOSE_DELAY=-1
    driver-class-name: org.h2.Driver
    username: sa
    password:
  jpa:
    database-platform: org.hibernate.dialect.H2Dialect
    hibernate:
      ddl-auto: create-drop
patient-profile:
  service:
    url: http://localhost:8081
